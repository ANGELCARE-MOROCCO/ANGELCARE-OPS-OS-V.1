<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Déverrouillage ANGELCARE</title><link rel="stylesheet" href="./styles.css"></head><body><main><section class="card"><div class="mark">A</div><p class="eyebrow">ANGELCARE CORPORATE STATION</p><h1>Déverrouillage administrateur</h1><p class="lead">La sortie du mode corporate nécessite une autorisation locale sécurisée. Le code n’est jamais enregistré en clair.</p><div id="alert" class="alert" hidden></div><form id="form"><div class="method"><button type="button" data-method="pin" class="active">PIN administrateur</button><button type="button" data-method="recovery">Code de récupération</button></div><label>Code sécurisé<input id="secret" type="password" inputmode="numeric" autocomplete="off" minlength="6" required autofocus></label><label id="reason-wrap">Motif de sortie<textarea id="reason" maxlength="1000" placeholder="Intervention, maintenance, changement de poste…"></textarea></label><div id="lockout" class="lockout" hidden></div><button id="submit" type="submit" class="primary">Valider et déverrouiller</button><button id="cancel" type="button" class="secondary">Annuler</button></form><p class="security">Surface locale Electron · Isolation de contexte · Aucune page distante</p></section></main><script src="./unlock.js"></script></body></html>
